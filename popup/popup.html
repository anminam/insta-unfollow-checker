<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Insta Unfollow Checker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #faf9f7;
      color: #1c1917;
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
    }
    .app-name {
      font-size: 15px;
      font-weight: 700;
      color: #1c1917;
      letter-spacing: -0.3px;
    }
    .tagline {
      font-size: 12px;
      color: #78716c;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .open-btn {
      display: block;
      width: 100%;
      padding: 11px 0;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: #e67e22;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: -0.2px;
    }
    .open-btn:hover {
      background: #d35400;
    }
  </style>
</head>
<body>
  <div class="logo-row">
    <img class="logo-icon" src="../icons/icon48.png" alt="">
    <span class="app-name">Insta Unfollow Checker</span>
  </div>
  <p class="tagline" id="popup-tagline"></p>
  <button class="open-btn" id="open-btn"></button>
  <script src="popup.js"></script>
</body>
</html>
