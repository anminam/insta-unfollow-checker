<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Icon Generator - Insta Unfollow Checker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  h1 { font-size: 24px; margin-bottom: 8px; }
  .subtitle { color: #888; margin-bottom: 40px; font-size: 14px; }
  .icons {
    display: flex;
    gap: 48px;
    align-items: end;
    margin-bottom: 40px;
  }
  .icon-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .icon-box canvas {
    border-radius: 4px;
    image-rendering: pixelated;
  }
  .icon-label {
    font-size: 13px;
    color: #aaa;
    font-weight: 600;
  }
  .preview-large {
    margin-bottom: 40px;
  }
  .preview-large canvas {
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  button {
    padding: 12px 32px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .downloads { margin-top: 20px; display: flex; gap: 10px; }
  .downloads a {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    background: #333;
    text-decoration: none;
  }
  .downloads a:hover { background: #444; }
</style>
</head>
<body>

<h1>Insta Unfollow Checker Icon</h1>
<p class="subtitle">Instagram unfollow 느낌의 아이콘 — Canvas로 생성 후 PNG 다운로드</p>

<div class="preview-large">
  <canvas id="preview" width="256" height="256"></canvas>
</div>

<div class="icons">
  <div class="icon-box">
    <canvas id="icon128" width="128" height="128"></canvas>
    <span class="icon-label">128px</span>
  </div>
  <div class="icon-box">
    <canvas id="icon48" width="48" height="48"></canvas>
    <span class="icon-label">48px</span>
  </div>
  <div class="icon-box">
    <canvas id="icon16" width="16" height="16"></canvas>
    <span class="icon-label">16px</span>
  </div>
</div>

<div class="btn-row">
  <button onclick="downloadAll()">전체 다운로드 (16 + 48 + 128)</button>
</div>
<div class="downloads" id="download-links"></div>

<script>
function drawIcon(ctx, size) {
  const s = size;
  const r = s * 0.22; // corner radius

  ctx.clearRect(0, 0, s, s);

  // === Background: Instagram gradient rounded square ===
  const grad = ctx.createLinearGradient(0, s, s, 0);
  grad.addColorStop(0, '#f09433');
  grad.addColorStop(0.25, '#e6683c');
  grad.addColorStop(0.5, '#dc2743');
  grad.addColorStop(0.75, '#cc2366');
  grad.addColorStop(1, '#bc1888');

  roundRect(ctx, 0, 0, s, s, r);
  ctx.fillStyle = grad;
  ctx.fill();

  // === Inner dark rounded rect (Instagram camera style) ===
  const inset = s * 0.08;
  const innerR = r * 0.75;
  roundRect(ctx, inset, inset, s - inset * 2, s - inset * 2, innerR);
  ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
  ctx.fill();

  // === Person silhouette (upper-center) ===
  const personCx = s * 0.42;
  const personTop = s * 0.22;

  // Head
  const headR = s * 0.11;
  ctx.beginPath();
  ctx.arc(personCx, personTop + headR, headR, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Body (arc shape)
  const bodyTop = personTop + headR * 2 + s * 0.04;
  const bodyW = s * 0.24;
  ctx.beginPath();
  ctx.ellipse(personCx, bodyTop + s * 0.06, bodyW * 0.5, s * 0.15, 0, Math.PI, 0, true);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // === Red "minus" badge (bottom-right) ===
  const badgeCx = s * 0.72;
  const badgeCy = s * 0.68;
  const badgeR = s * 0.18;

  // Badge circle - red with slight shadow
  ctx.beginPath();
  ctx.arc(badgeCx, badgeCy, badgeR + s * 0.02, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();

  ctx.beginPath();
  ctx.arc(badgeCx, badgeCy, badgeR, 0, Math.PI * 2);
  ctx.fillStyle = '#ed4956';
  ctx.fill();

  // Minus sign
  const minusW = badgeR * 1.1;
  const minusH = s >= 48 ? s * 0.04 : 2;
  ctx.beginPath();
  roundRect(ctx, badgeCx - minusW / 2, badgeCy - minusH / 2, minusW, minusH, minusH / 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Draw all sizes
[
  ['preview', 256],
  ['icon128', 128],
  ['icon48', 48],
  ['icon16', 16]
].forEach(([id, size]) => {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext('2d');
  drawIcon(ctx, size);
});

function downloadAll() {
  [16, 48, 128].forEach(size => {
    const canvas = document.getElementById('icon' + size);
    const link = document.createElement('a');
    link.download = 'icon' + size + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
}
</script>

</body>
</html>
