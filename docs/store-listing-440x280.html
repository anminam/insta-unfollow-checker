<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Store Promo Tile - 440x280</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 440px;
  height: 280px;
  overflow: hidden;
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #08080d;
  color: #e8e8f0;
  position: relative;
}

.bg-glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
}
.bg-glow-1 {
  width: 250px; height: 250px;
  top: -80px; left: -60px;
  background: radial-gradient(circle, #e040fb 0%, transparent 70%);
  opacity: 0.35;
}
.bg-glow-2 {
  width: 200px; height: 200px;
  bottom: -60px; right: -30px;
  background: radial-gradient(circle, #ff006e 0%, transparent 70%);
  opacity: 0.2;
}

.bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 30px 30px;
  pointer-events: none;
}

.layout {
  position: relative;
  z-index: 1;
  display: flex;
  width: 100%;
  height: 100%;
  padding: 32px 36px;
  gap: 24px;
  align-items: center;
}

.branding {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.logo-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow: 0 3px 14px rgba(224, 64, 251, 0.3);
}
.logo::before {
  content: '';
  position: absolute;
  inset: 2px;
  border-radius: 8px;
  background: #121218;
}
.logo-icon {
  position: relative;
  z-index: 1;
  font-size: 16px;
  font-weight: 800;
  background: linear-gradient(135deg, #f09433, #dc2743, #bc1888);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.app-name {
  font-size: 15px;
  font-weight: 700;
  color: #f0f0f8;
}

.tagline {
  font-size: 22px;
  font-weight: 800;
  line-height: 1.3;
  letter-spacing: -0.3px;
  background: linear-gradient(135deg, #f0f0f8 30%, #e040fb 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.features {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.feature {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  font-weight: 500;
  color: rgba(232, 232, 240, 0.65);
}
.feature-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.feature-dot.pink { background: #e040fb; }
.feature-dot.red { background: #ed4956; }
.feature-dot.blue { background: #3897f0; }

/* Right: Mini Phone */
.phone-wrap {
  flex: 0 0 130px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.phone {
  width: 120px;
  height: 220px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
  background: #1e1e1e;
  transform: rotate(3deg);
}

.phone-notch {
  width: 56px;
  height: 14px;
  background: #000;
  border-radius: 0 0 10px 10px;
  margin: 0 auto;
}

.phone-screen {
  padding: 6px 10px;
}

.screen-header {
  font-size: 10px;
  font-weight: 700;
  color: #e0e0e0;
  text-align: center;
  padding: 4px 0 8px;
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
}
.stat-card {
  background: #2a2a2a;
  border-radius: 6px;
  padding: 6px 4px;
  text-align: center;
}
.stat-val {
  font-size: 14px;
  font-weight: 800;
}
.stat-val.blue { color: #3897f0; }
.stat-val.green { color: #00c853; }
.stat-val.pink { color: #e040fb; }
.stat-val.red { color: #ed4956; }
.stat-lbl {
  font-size: 7px;
  color: #999;
}

.user-row {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 0;
  border-bottom: 1px solid #333;
}
.user-avatar {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  flex-shrink: 0;
}
.user-name {
  font-size: 8px;
  font-weight: 600;
  color: #e0e0e0;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.user-badge {
  font-size: 6px;
  padding: 1px 4px;
  border-radius: 4px;
  font-weight: 600;
  white-space: nowrap;
  background: rgba(237, 73, 86, 0.15);
  color: #ed4956;
}
</style>
</head>
<body>

<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>
<div class="bg-grid"></div>

<div class="layout">
  <div class="branding">
    <div class="logo-row">
      <div class="logo">
        <span class="logo-icon">IU</span>
      </div>
      <span class="app-name">Insta Unfollow Checker</span>
    </div>
    <div class="tagline">맞팔하지 않는<br>사람을 찾아보세요</div>
    <div class="features">
      <div class="feature"><span class="feature-dot pink"></span>팔로잉 · 팔로워 · 맞팔 분석</div>
      <div class="feature"><span class="feature-dot red"></span>원클릭 · 예약 언팔로우</div>
      <div class="feature"><span class="feature-dot blue"></span>통계 차트 · 팔로워 추적</div>
    </div>
  </div>

  <div class="phone-wrap">
    <div class="phone">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <div class="screen-header">분석 결과</div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-val blue">847</div>
            <div class="stat-lbl">팔로잉</div>
          </div>
          <div class="stat-card">
            <div class="stat-val green">1,203</div>
            <div class="stat-lbl">팔로워</div>
          </div>
          <div class="stat-card">
            <div class="stat-val pink">692</div>
            <div class="stat-lbl">맞팔</div>
          </div>
          <div class="stat-card">
            <div class="stat-val red">155</div>
            <div class="stat-lbl">맞팔 안함</div>
          </div>
        </div>
        <div class="user-row">
          <div class="user-avatar" style="background: linear-gradient(135deg, #f09433, #dc2743);"></div>
          <div class="user-name">user_example_01</div>
          <span class="user-badge">맞팔안함</span>
        </div>
        <div class="user-row">
          <div class="user-avatar" style="background: linear-gradient(135deg, #3897f0, #8854d0);"></div>
          <div class="user-name">demo_account_02</div>
          <span class="user-badge">맞팔안함</span>
        </div>
        <div class="user-row" style="border-bottom: none;">
          <div class="user-avatar" style="background: linear-gradient(135deg, #00c853, #3897f0);"></div>
          <div class="user-name">test_user_03</div>
          <span class="user-badge" style="background:rgba(136,84,208,0.15);color:#a882e8;">맞팔</span>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
